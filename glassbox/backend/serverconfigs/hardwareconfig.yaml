# Hardware MCP Server Configuration
#
# Exposes the GlassBox per-target hardware scan pipeline (scan_target.py:
# install -> ct_lint -> flash -> collect (TVLA campaign) -> tvla -> cpa)
# as MCP tools the agent can call. Each harness-compatible source file in
# a cloned repo is run through the full pipeline and produces a structured
# TargetReport with findings, verdict, and per-stage timings.
server_id: "hardware_server"
description: "Runs the GlassBox ESP32 TVLA + CPA scan against a cloned repo and reports per-target findings."

# Runtime configuration (relative path -> works on macOS/Linux/Windows
# when the runner uses ParseAgentConfig's repo-root resolution).
runtime:
  type: "go"
  command: "go"
  args: ['./hardwarego']
  port: 8084

# Tools provided by this server
tools:
  - tool_id: "list_hardware_targets"
    description: |
      Walk a cloned repository and return every C/C++ source file that
      already defines `gb_target_call(...)` (the GlassBox harness ABI).

      DOMAIN FIT (read this first):
      GlassBox audits cryptographic, authentication, parsing, and
      comparison code on real ESP32 hardware -- functions that take
      a byte buffer + length and behave deterministically in < ~100 ms
      with no STL, no iostream, no dynamic allocation. It is NOT a
      general-purpose code review tool. If the repo is a game, web app,
      CLI tool, CRUD service, UI component, etc., it is OUT OF SCOPE
      regardless of whether anything compiles.

      You MUST call this BEFORE start_hardware_audit. Branch on the
      result:

        BRANCH A -- count > 0:
          The repo is natively harness-shaped. Show the user
          response.targets, then call start_hardware_audit.

        BRANCH B -- count == 0 AND the repo plausibly contains
        crypto/auth/parser/comparison code:
          DO NOT give up. DO NOT tell the user to add gb_target_call
          themselves -- that recommendation is FORBIDDEN. Instead:
            1. For each .cpp/.c file in response.skipped, fetch its
               contents (use the repo_context_server tools).
            2. Identify functions whose signatures match one of the
               three supported shapes:
                 - int|bool|void f(const uint8_t* p, size_t n)
                 - int|bool|void f(const uint8_t* a, const uint8_t* b, size_t n)
                 - int f(const uint8_t* in, size_t in_len, uint8_t* out, size_t* out_len)
            3. For each candidate, call register_synthetic_target with
               {repo_root, source_file (relative), function_name}
               (and reference_hex if it's a 2-pointer comparator).
            4. Re-call list_hardware_targets to confirm the synthetic
               wrappers now show up, then call start_hardware_audit.

        BRANCH C -- count == 0 AND no candidate functions exist (the
        repo is a game, web app, UI library, etc.):
          The repo is OUT OF SCOPE for GlassBox. Tell the user EXACTLY
          this kind of message (paraphrase, but keep the substance):
            "This repo (<name>) is a <one-line classification: e.g.
             console C++ game, Python web app, React UI library>.
             GlassBox audits cryptographic, authentication, parsing, and
             comparison code on real ESP32 hardware -- it doesn't apply
             to <classification>. If you have a repo with crypto, auth,
             token verification, or byte-buffer parsing code you'd like
             audited, share that one instead."
          DO NOT recommend adding gb_target_call. DO NOT recommend
          'review for buffer overflows / memory leaks / input validation'
          (that's not what GlassBox does). DO NOT offer a generic code
          review.

      Every response includes `harness_abi_signature` and
      `harness_abi_header` for reference, but NEVER quote them to the
      user as a "to make this work, add this function" instruction.
      Their only purpose is internal: telling YOU what register_synthetic_target
      synthesizes on the user's behalf.
    handler: "list_hardware_targets"
    input_schema:
      properties:
        repo_root:
          type: "string"
          description: "Absolute path to the cloned repo (e.g. the repo_root returned by clone_repo)."
        filter:
          type: "string"
          description: "Optional regex applied to repo-relative path; only matching files are returned."
      required:
        - repo_root

  - tool_id: "register_synthetic_target"
    description: |
      Wrap a function in the user's repo as a flashable harness target,
      WITHOUT asking the user to modify their code. You identify a
      candidate function and tell us where it lives; the server reads
      the file, parses the function's signature, picks a wrapper
      template, and writes a generated `gb_target.cpp` into
      `<repo_root>/__glassbox_synthetic__/<target_name>.cpp` (the
      regular scanner picks it up automatically on the next
      list_hardware_targets / start_hardware_audit).

      Payload (keep it minimal -- the server does everything else):

          {
            "repo_root":     "<absolute path to the cloned repo>",
            "source_file":   "<path relative to repo_root>",
            "function_name": "<C identifier>",
            "reference_hex": "<optional, see below>",
            "target_name":   "<optional override; defaults to function_name>"
          }

      Supported function signature shapes (anything else returns
      error_code=unsupported_signature with a list of accepted shapes):

        - bytes_len       : int|bool|void f(const uint8_t* p, size_t n)
        - comparator_len  : int|bool|void f(const uint8_t* a, const uint8_t* b, size_t n)
                            REQUIRES reference_hex -- the constant the
                            function compares secret against (the value
                            an attacker is trying to recover). Example:
                            reference_hex="676c617373626f78".
        - harness_native  : int f(const uint8_t* in, size_t in_len,
                                  uint8_t* out, size_t* out_len)

      Constraints to remember when picking a function:
        * Must be pure C/C++ (no Serial, delay, wifi, flash writes,
          dynamic allocation that won't fit on ESP32, no STL containers
          like vector/string/unordered_map, no iostream).
        * Must complete in < ~100 ms.
        * Inputs <= 64 bytes, outputs <= 64 bytes.
        * If `#include`-ing the user's source pulls in any of the above,
          the audit's compile step will fail and you'll see the error in
          the audit result -- pick a different function or file then.

      Successful response shape:

          {
            "repo_root": "...", "source_file": "...", "function_name": "...",
            "shape_used": "bytes_len|comparator_len|harness_native",
            "wrapper_path": "<absolute>",
            "wrapper_rel_path": "__glassbox_synthetic__/<name>.cpp",
            "parsed_signature": "<echo of the matched declaration>",
            "harness_abi_signature_used": "int gb_target_call(...)"
          }

      You can register multiple targets back-to-back from the same repo.
      The synthetic dir is wiped at the end of every audit, so always
      re-register before kicking off a new audit on the same repo.
    handler: "register_synthetic_target"
    input_schema:
      properties:
        repo_root:
          type: "string"
          description: "Absolute path to the cloned repo."
        source_file:
          type: "string"
          description: "Path to the user's source file, RELATIVE to repo_root."
        function_name:
          type: "string"
          description: "C identifier naming the function to wrap. Must appear as a single-line declaration or definition in source_file."
        reference_hex:
          type: "string"
          description: "Hex-encoded byte string. REQUIRED when the function has a 2-pointer comparator signature; ignored otherwise. 1..64 bytes after decoding."
        target_name:
          type: "string"
          description: "Optional override for the synthesized file's basename (defaults to function_name). Must be a valid C identifier."
      required:
        - repo_root
        - source_file
        - function_name

  - tool_id: "start_hardware_audit"
    description: |
      Kick off a background TVLA + CPA scan over every harness-compatible
      source file in repo_root (NATIVE files defining gb_target_call,
      PLUS any wrappers you previously registered via
      register_synthetic_target). For each target the server runs the
      full per-target pipeline (scan_target.py):

        1. install   copy source into the ESP32 harness slot
        2. ct_lint   static side-channel linter (ms-scale, no hw needed)
        3. flash     compile + upload via Pico bridge, verify boot
        4. collect   sweep ~500 traces with the auto-picked TVLA campaign
                     ('match_vs_random' for byte-compare shapes,
                     'random_vs_zero' otherwise)
        5. tvla      Welch's t-test on cycles + power channels (1st + 2nd
                     order; threshold |t|=4.5)
        6. cpa       correlation power analysis on the random group
                     (Hamming-weight on AES S-box; gives a per-byte rank)

      Returns immediately with an audit_id; poll get_hardware_audit_status
      for progress AND for the final findings. Only one audit can run at
      a time (hardware is shared). The synthetic wrapper directory is
      cleaned up automatically when the audit ends.

      CALL DISCIPLINE -- the agent ABSOLUTELY MUST follow this:
        - Call this AT MOST ONCE per turn. Never retry; never call again
          if you already got an audit_id back. If you mistakenly call it
          a second time and an audit is already running, you'll get HTTP
          409 error_code=audit_in_progress (see below) -- treat that as
          confirmation that your first call already succeeded and switch
          to get_hardware_audit_status with details.existing_audit_id.
        - The audit takes ~3-6 minutes. Do NOT loop polling within the
          same turn -- one optional confirmation poll is fine, then stop
          and tell the user to ping back. The status endpoint is the
          only correct way to surface progress.

      PRECONDITIONS:
        1. You must have called list_hardware_targets at least once.
        2. If that returned count == 0, you must register at least one
           synthetic target via register_synthetic_target BEFORE calling
           this -- otherwise this returns HTTP 400 error_code=no_targets.

      The audit_in_progress error response shape (HTTP 409):

          {
            "error":      "another audit is already running on the shared hardware",
            "error_code": "audit_in_progress",
            "details": {
              "existing_audit_id": "audit-...",
              "hint":              "..."
            },
            "hint":        "...",
            "next_action": "get_hardware_audit_status"
          }

      When you see error_code=audit_in_progress: poll
      get_hardware_audit_status (with audit_id omitted, OR with
      details.existing_audit_id) and report progress to the user. Do
      NOT call start_hardware_audit again.

      The no_targets error response shape:

          {
            "error":      "no harness-compatible source files found in repo_root",
            "error_code": "no_targets",
            "details": {
              "repo_root":             "...",
              "cpp_files_scanned":     N,
              "harness_compatible":    0,
              "skipped_count":         N,
              "skipped_examples":      [{"rel_path": "...", "reason": "..."}],
              "harness_abi_signature": "int gb_target_call(...);",
              "harness_abi_header":    "glassbox/backend/hardware/esp/harness/gb_target.h"
            },
            "hint":        "<short remediation paragraph>",
            "next_action": "list_hardware_targets"
          }

      When you see error_code=no_targets:
        - If the repo plausibly contains crypto/auth/parser/comparison
          code, follow Branch B in list_hardware_targets's description:
          read the files, register_synthetic_target each candidate, retry.
        - If the repo is OUT OF SCOPE (game, web app, UI library, etc.),
          follow Branch C: tell the user it's not applicable to GlassBox.
          DO NOT recommend they add gb_target_call themselves -- that
          recommendation is FORBIDDEN.
    handler: "start_hardware_audit"
    input_schema:
      properties:
        repo_root:
          type: "string"
          description: "Absolute path to the cloned repo to audit."
        filter:
          type: "string"
          description: "Optional regex; only matching files are flashed."
        bridge_seconds:
          type: "number"
          description: "Pico bridge-mode timeout (default 90)."
          default: 90
        esp_port:
          type: "string"
          description: "Override ESP32 serial port (rarely needed)."
        pico_port:
          type: "string"
          description: "Override Pico serial port (rarely needed)."
      required:
        - repo_root

  - tool_id: "get_hardware_audit_status"
    description: |
      Return the current state of the most recent (or specified) audit.
      Safe to call repeatedly. The agent uses this both for progress
      ("audit still running, currently capturing traces on
      byte_compare.cpp") and for the final findings rollup.

      Response shape:

          {
            "audit_id":      "...",
            "repo_root":     "...",
            "state":         "running|done|cancelled|failed",
            "started_at":    "RFC3339",
            "finished_at":   "RFC3339"             // present only when state != running
            "elapsed_secs":  <float>,
            "total":         <int>,                // # of targets queued
            "completed":     <int>,                // pass + fail
            "passed":        <int>,                // verdict == "safe"
            "failed":        <int>,                // crashes, leaks, key recovery, etc.
            "current_index": <int>,                // 1-based; 0 if not yet started
            "current_target":"<basename>",
            "current_step":  "install|ct_lint|flash|collect|analyze|...",
            "summary":       "X passed, Y failed (of Z targets)",
            "results": [
              {
                "name":          "<basename>",
                "path":          "<absolute>",
                "state":         "queued|install|ct_lint|flash|collect|analyze|pass|fail|skipped|cancelled",
                "pass":          <bool>,           // verdict == "safe"
                "reason":        "verdict=... worst=... findings=N"
                                                   // OR an env-error string if scan_target never emitted JSON
                "duration_secs": <float>,
                // ---- TargetReport fields (mirrors scan_target.py) ----
                "verdict":        "safe|leak_detected|crash_detected|key_recovered|memory_corruption_detected|static_warning",
                "worst_severity": "CRITICAL|HIGH|MEDIUM|LOW|INFO|pass",
                "findings":       [ Finding, ... ],   // see below
                "findings_summary": {
                  "total":       <int>,
                  "by_severity": {"CRITICAL": n, "HIGH": n, ...},
                  "by_type":     {"tvla": n, "crash": n, "static": n, "cpa_key_recovery": n, ...},
                  "worst_severity": "..."
                },
                "n_traces":   <int>,                  // traces that survived collect
                "stage_secs": {"install": ..., "ct_lint": ..., "flash": ..., "collect": ..., "analyze": ...}
              },
              ...
            ]
          }

      Each `Finding` has:

          {
            "id":       "f_001",
            "type":     "tvla|crash|static|cpa_key_recovery|memory_corruption|...",
            "severity": "CRITICAL|HIGH|MEDIUM|LOW|INFO|pass",
            "title":    "<one-line headline>",
            "detail":   "<paragraph explaining what we measured>",
            "data":     { ...type-specific fields, e.g. tvla: channel/order/t_abs/threshold, cpa: per_byte... },
            "remediation": "<optional fix guidance>",
            "source":   { "file": "...", "line": N, "col": N }   // ct_lint findings only
          }

      AGENT GUIDANCE:
        * When state == "done", produce ONE <<code>> block per
          non-`pass` finding in `results[*].findings`. Use the finding's
          `title`, `severity`, `detail`, and `remediation` directly --
          do NOT re-derive findings from the source. The whole point of
          running on hardware is that the report is empirical.
        * Quote `t_abs` and `threshold` in TVLA findings ("Welch's |t|=NN
          > 4.5 on the cycles channel") so the user knows the result is
          measured, not predicted.
        * `verdict == "safe"` AND `worst_severity == "pass"` means the
          target genuinely had no measurable side-channel; report it as
          a confirmed pass, not as an absence of evidence.
        * `verdict == "static_warning"` with all-pass TVLA usually means
          the campaign couldn't excite the leak ct_lint flagged -- the
          report includes a CT_AUTO finding with a recommended rerun.
    handler: "get_hardware_audit_status"
    input_schema:
      properties:
        audit_id:
          type: "string"
          description: "Optional. If omitted, returns the most recent audit."

  - tool_id: "cancel_hardware_audit"
    description: |
      Cancel a running audit: kills the in-flight scan_target.py
      subprocess and marks remaining targets as cancelled. scan_target.py
      restores the harness gb_target.cpp from its own scanbak file as
      part of its finally clause, so cancellation is safe to call
      mid-flash and mid-collect.
    handler: "cancel_hardware_audit"
    input_schema:
      properties:
        audit_id:
          type: "string"
          description: "Optional. If omitted, cancels the most recent audit."
