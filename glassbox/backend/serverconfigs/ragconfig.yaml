# RAG Server Configuration
server_id: "rag_server"
description: "FAISS vector database for semantic search over audit findings and repo code"

# Runtime configuration
runtime:
  type: "python"
  command: "python"
  # We use -m uvicorn to run the FastAPI app
  # Note: The launcher will use the venv if we point the command to the venv's python
  # However, the current launcher assumes 'python' is in path. 
  # We might need to adjust the command to the absolute path of the venv python if not globally available.
  args: ['-m', 'uvicorn', 'ragserver.server:app', '--port', '8083']
  port: 8083

# Environment variables required
env:
  NVIDIA_API_KEY: "${NVIDIA_API_KEY}"
  NEMOTRON_BASE_URL: "https://integrate.api.nvidia.com/v1"
  NEMOTRON_EMBEDDING_MODEL: "nvidia/nv-embedqa-e5-v5"

# Tools provided by this server
tools:
  - tool_id: "search_findings"
    description: "Semantic search over audit findings. Use this to answer questions like 'show me all password-related vulnerabilities' or 'what should I fix first?'"
    handler: "search_findings"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The unique ID for the current audit run"
        query:
          type: "string"
          description: "Natural language search query"
        k:
          type: "integer"
          description: "Number of results to return (default: 5)"
          default: 5
        severity_filter:
          type: "string"
          description: "Optional: filter by CRITICAL, HIGH, MEDIUM, or LOW"
        scanner_filter:
          type: "string"
          description: "Optional: filter by scanner name (sidechannel, secrets, git_history, endpoints, deps)"
      required:
        - run_id
        - query

  - tool_id: "search_code"
    description: "Semantic search over the audited repository's source code. Use this to find code related to a topic."
    handler: "search_code"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The unique ID for the current audit run"
        query:
          type: "string"
          description: "Natural language or code pattern to search for"
        k:
          type: "integer"
          description: "Number of results to return (default: 5)"
          default: 5
      required:
        - run_id
        - query

  - tool_id: "index_code"
    description: "Index the repository code into the vector database. Should be called once at the start of an audit."
    handler: "index_code"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The unique ID for the current audit run"
        repo_path:
          type: "string"
          description: "Absolute path to the repository root"
      required:
        - run_id
        - repo_path

  - tool_id: "add_finding"
    description: "Index a new audit finding into the vector database. Called automatically by the scanner orchestrator."
    handler: "add_finding"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The unique ID for the current audit run"
        finding:
          type: "object"
          description: "A Finding object conforming to the unified schema"
      required:
        - run_id
        - finding
