# RAG Server Configuration
server_id: "rag_server"
description: "Go-based vector database for semantic search over audit findings and repo code"

# Runtime configuration
runtime:
  type: "python"
  command: "python3"
  # --app-dir tells uvicorn where to find `server:app` without us needing to cd.
  # Paths are resolved relative to wherever main.exe is launched (glassbox/backend/).
  args: ["-m", "uvicorn", "server:app", "--app-dir", "ragserver", "--host", "0.0.0.0", "--port", "8085"]
  port: 8085
# Environment variables required
env:
  NVIDIA_API_KEY: "${NVIDIA_API_KEY}"
  NEMOTRON_BASE_URL: "https://integrate.api.nvidia.com/v1"
  NEMOTRON_EMBEDDING_MODEL: "nvidia/nv-embedqa-e5-v5"

# Tools provided by this server
tools:
  - tool_id: "search_findings"
    description: "Semantic search over audit findings for this run_id."
    handler: "search_findings"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The unique ID for the current audit run"
        query:
          type: "string"
          description: "Natural language search query"
        k:
          type: "number"
          description: "Number of results to return (default: 5)"
          default: 5
        severity_filter:
          type: "string"
          description: "Optional: filter by CRITICAL, HIGH, MEDIUM, or LOW"
        scanner_filter:
          type: "string"
          description: "Optional: filter by scanner name (sidechannel, secrets, git_history, endpoints, deps)"
      required:
        - run_id
        - query

  - tool_id: "search_code"
    description: "Semantic search over indexed repository source code. Must call index_code for this run_id before using search_code."
    handler: "search_code"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The unique ID for the current audit run"
        query:
          type: "string"
          description: "Natural language or code pattern to search for"
        k:
          type: "number"
          description: "Number of results to return (default: 5)"
          default: 5
      required:
        - run_id
        - query

  - tool_id: "index_code"
    description: "Index repository code into the vector database for a run_id. Call this at audit start before any search_code calls."
    handler: "index_code"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The unique ID for the current audit run"
        repo_path:
          type: "string"
          description: "Absolute path to the repository root"
      required:
        - run_id
        - repo_path

  - tool_id: "index_status"
    description: "Get current index status for a run_id (findings count, code chunk count, memory notes count)."
    handler: "index_status"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The unique ID for the current audit run"
      required:
        - run_id

  - tool_id: "search_memory"
    description: "Semantic search over reusable long-term notes (insights + snippets + fixes) saved from prior workflows. Use this first for future audits."
    handler: "search_memory"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The memory namespace for this audit family or project"
        query:
          type: "string"
          description: "Natural language query for prior solutions/insights"
        k:
          type: "number"
          description: "Number of notes to return (default: 5)"
          default: 5
        tag_filter:
          type: "string"
          description: "Optional: filter by one tag (e.g. sidechannel, auth, parser)"
      required:
        - run_id
        - query

  - tool_id: "add_memory_note"
    description: "Persist a reusable note at the end of a workflow so future runs can retrieve it."
    handler: "add_memory_note"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The memory namespace for this audit family or project"
        note:
          type: "object"
          description: "Memory note with title/problem/insight and optional snippet/file/line/tags"
      required:
        - run_id
        - note

  - tool_id: "add_finding"
    description: "Index a new audit finding into the vector database. Called automatically by the scanner orchestrator."
    handler: "add_finding"
    input_schema:
      properties:
        run_id:
          type: "string"
          description: "The unique ID for the current audit run"
        finding:
          type: "object"
          description: "A Finding object conforming to the unified schema"
      required:
        - run_id
        - finding
